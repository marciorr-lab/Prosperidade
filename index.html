<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Prosperidade</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f13;color:#f0ede8;font-family:Georgia,serif;min-height:100vh}
  input,select,button{font-family:Georgia,serif}
  input:focus{outline:none}
  select option{background:#1a1a24}
  ::-webkit-scrollbar{width:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const firebaseConfig = {
  apiKey: "AIzaSyDKDA2vGuDb55PNfZ9H7Icb5mterbyIM1c",
  authDomain: "controle-financeiro-2d108.firebaseapp.com",
  projectId: "controle-financeiro-2d108",
  storageBucket: "controle-financeiro-2d108.firebasestorage.app",
  messagingSenderId: "410695463761",
  appId: "1:410695463761:web:cfb273305c39cb309e5970"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const CATS = [
  {id:"mercado",     e:"🛒", l:"Mercado",     c:"#4ade80"},
  {id:"alimentacao", e:"🍽️", l:"Alimentação", c:"#fb923c"},
  {id:"educacao",    e:"📚", l:"Educação",     c:"#60a5fa"},
  {id:"saude",       e:"🏥", l:"Saúde",        c:"#f472b6"},
  {id:"transporte",  e:"🚗", l:"Transporte",   c:"#a78bfa"},
  {id:"lazer",       e:"🎉", l:"Lazer",        c:"#fbbf24"},
  {id:"roupas",      e:"👕", l:"Roupas",       c:"#34d399"},
  {id:"casa",        e:"🏠", l:"Casa",         c:"#f87171"},
  {id:"assinaturas", e:"📱", l:"Assinaturas",  c:"#38bdf8"},
  {id:"outros",      e:"📦", l:"Outros",       c:"#94a3b8"},
];

const ITYPES = [
  {id:"salario",   e:"💼", l:"Salário",   c:"#4ade80"},
  {id:"freelance", e:"🛠️", l:"Freelance", c:"#60a5fa"},
  {id:"reembolso", e:"↩️", l:"Reembolso", c:"#fbbf24"},
  {id:"bonus",     e:"🏆", l:"Bônus",     c:"#fb923c"},
  {id:"aluguel",   e:"🏘️", l:"Aluguel",   c:"#a78bfa"},
  {id:"dividendo", e:"📈", l:"Dividendo", c:"#34d399"},
  {id:"presente",  e:"🎁", l:"Presente",  c:"#f472b6"},
  {id:"outro",     e:"📦", l:"Outro",     c:"#94a3b8"},
];

const PMS = [
  {id:"corrente", e:"🏦", l:"Conta Corrente"},
  {id:"card1",    e:"💳", l:"Cartão Casa"},
  {id:"card2",    e:"💳", l:"Cartão Marcio"},
  {id:"card3",    e:"💳", l:"Cartão Juliana"},
];

const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const now = new Date();
const fmt = v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const IS = {background:"#1a1a24",border:"1.5px solid #2a2a3a",borderRadius:10,padding:"12px 14px",color:"#f0ede8",fontSize:14,outline:"none",width:"100%"};
const SS = {background:"#1a1a24",border:"1.5px solid #2a2a3a",borderRadius:8,padding:"8px 10px",color:"#f0ede8",fontSize:12,outline:"none",cursor:"pointer"};
const CS = (bg,b) => ({background:bg,border:"1px solid "+b+"33",borderRadius:12,padding:"14px"});

const {useState,useMemo,useEffect} = React;

function App() {
  const [expenses,  setExpenses]  = useState([]);
  const [incomes,   setIncomes]   = useState([]);
  const [accounts,  setAccounts]  = useState([]);
  const [contribs,  setContribs]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [syncing,   setSyncing]   = useState(false);
  const [tab,       setTab]       = useState("add");
  const [mode,      setMode]      = useState("expense");
  const [month,     setMonth]     = useState(now.getMonth());
  const [year]                    = useState(now.getFullYear());
  const [names,     setNames]     = useState({p1:"Marcio", p2:"Juliana"});
  const [editN,     setEditN]     = useState(false);
  const [ok,        setOk]        = useState("");
  const [invOk,     setInvOk]     = useState("");
  const [showAcc,   setShowAcc]   = useState(false);
  const [fCat,      setFCat]      = useState("all");
  const [fPm,       setFPm]       = useState("all");
  const [fPer,      setFPer]      = useState("all");
  const [fType,     setFType]     = useState("all");

  const today = now.toISOString().split("T")[0];
  const [ef,  setEf]  = useState({desc:"",amt:"",cat:"mercado",pm:"corrente",person:"p1",date:today});
  const [inf, setInf] = useState({desc:"",amt:"",type:"salario",person:"p1",date:today});
  const [invF, setInvF] = useState({accId:"",amt:"",month:now.getMonth(),year:now.getFullYear()});
  const [newA, setNewA] = useState({name:"",inst:"",bal:""});

  const flash    = msg => { setOk(msg);    setTimeout(()=>setOk(""),   2200); };
  const flashInv = msg => { setInvOk(msg); setTimeout(()=>setInvOk(""),2200); };

  useEffect(()=>{
    let n=0; const done=()=>{ n++; if(n>=4) setLoading(false); };
    const u1=db.collection("expenses").orderBy("date","desc").onSnapshot(s=>{setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))); done();});
    const u2=db.collection("incomes").orderBy("date","desc").onSnapshot(s=>{setIncomes(s.docs.map(d=>({id:d.id,...d.data()}))); done();});
    const u3=db.collection("accounts").onSnapshot(s=>{setAccounts(s.docs.map(d=>({id:d.id,...d.data()}))); done();});
    const u4=db.collection("contribs").orderBy("date","desc").onSnapshot(s=>{setContribs(s.docs.map(d=>({id:d.id,...d.data()}))); done();});
    return ()=>{u1();u2();u3();u4();};
  },[]);

  const mExp = useMemo(()=>expenses.filter(e=>e.month===month&&e.year===year),[expenses,month,year]);
  const mInc = useMemo(()=>incomes.filter(i=>i.month===month&&i.year===year),[incomes,month,year]);
  const totExp = mExp.reduce((s,e)=>s+e.amount,0);
  const totInc = mInc.reduce((s,i)=>s+i.amount,0);
  const bal = totInc - totExp;

  const fExp = useMemo(()=>mExp.filter(e=>(fCat==="all"||e.cat===fCat)&&(fPm==="all"||e.pm===fPm)&&(fPer==="all"||e.person===fPer)),[mExp,fCat,fPm,fPer]);
  const fInc = useMemo(()=>mInc.filter(i=>(fPer==="all"||i.person===fPer)&&(fType==="all"||i.type===fType)),[mInc,fPer,fType]);

  const byCat  = useMemo(()=>{const m={};mExp.forEach(e=>{m[e.cat]=(m[e.cat]||0)+e.amount});return CATS.map(c=>({...c,total:m[c.id]||0})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);},[mExp]);
  const byCard = useMemo(()=>{const m={};mExp.forEach(e=>{m[e.pm]=(m[e.pm]||0)+e.amount});return PMS.map(p=>({...p,total:m[p.id]||0}));},[mExp]);
  const byType = useMemo(()=>{const m={};mInc.forEach(i=>{m[i.type]=(m[i.type]||0)+i.amount});return ITYPES.map(t=>({...t,total:m[t.id]||0})).filter(t=>t.total>0).sort((a,b)=>b.total-a.total);},[mInc]);

  const pExp = p => mExp.filter(e=>e.person===p).reduce((s,e)=>s+e.amount,0);
  const pInc = p => mInc.filter(i=>i.person===p).reduce((s,i)=>s+i.amount,0);

  const prevM   = month===0?11:month-1;
  const prevY   = month===0?year-1:year;
  const prevExp = expenses.filter(e=>e.month===prevM&&e.year===prevY);
  const prevInc = incomes.filter(i=>i.month===prevM&&i.year===prevY);
  const prevT   = prevExp.reduce((s,e)=>s+e.amount,0);
  const prevI   = prevInc.reduce((s,i)=>s+i.amount,0);
  const prevBC  = useMemo(()=>{const m={};prevExp.forEach(e=>{m[e.cat]=(m[e.cat]||0)+e.amount});return m;},[prevExp]);
  const diff    = totExp-prevT;
  const diffP   = prevT>0?((diff/prevT)*100).toFixed(1):null;

  const totInv   = accounts.reduce((s,a)=>s+a.balance,0);
  const totContr = contribs.reduce((s,c)=>s+c.amount,0);
  const cByM = useMemo(()=>{
    const m={};
    contribs.forEach(c=>{const k=c.year+"-"+String(c.month).padStart(2,"0");m[k]=(m[k]||0)+c.amount;});
    return Object.entries(m).sort(([a],[b])=>a.localeCompare(b)).map(([k,t])=>{const[y,mo]=k.split("-");return{label:MONTHS[parseInt(mo)]+" "+y,total:t};});
  },[contribs]);
  const maxC    = cByM.reduce((m,c)=>Math.max(m,c.total),1);
  const maxCat  = byCat.length>0?byCat[0].total:1;
  const maxType = byType.length>0?byType[0].total:1;

  const addExp = async()=>{
    if(!ef.desc||!ef.amt||parseFloat(ef.amt)<=0) return;
    setSyncing(true);
    const d=new Date(ef.date+"T12:00:00");
    const isCard=ef.pm!=="corrente";
    const dm=d.getMonth()+1>=12?0:d.getMonth()+1;
    const dy=d.getMonth()+1>=12?d.getFullYear()+1:d.getFullYear();
    await db.collection("expenses").add({
      date:ef.date,month:d.getMonth(),year:d.getFullYear(),
      desc:ef.desc,cat:ef.cat,pm:ef.pm,person:ef.person,
      amount:parseFloat(parseFloat(ef.amt).toFixed(2)),
      isCard,dueDate:isCard?(dy+"-"+String(dm+1).padStart(2,"0")+"-10"):null,
      createdAt:new Date().toISOString()
    });
    setEf(f=>({...f,desc:"",amt:""}));
    setSyncing(false);
    flash("Gasto lançado! ✓");
  };

  const addInc = async()=>{
    if(!inf.desc||!inf.amt||parseFloat(inf.amt)<=0) return;
    setSyncing(true);
    const d=new Date(inf.date+"T12:00:00");
    await db.collection("incomes").add({
      date:inf.date,month:d.getMonth(),year:d.getFullYear(),
      desc:inf.desc,type:inf.type,person:inf.person,
      amount:parseFloat(parseFloat(inf.amt).toFixed(2)),
      createdAt:new Date().toISOString()
    });
    setInf(f=>({...f,desc:"",amt:""}));
    setSyncing(false);
    flash("Entrada registrada! ✓");
  };

  const delExp = async id=>{ await db.collection("expenses").doc(id).delete(); };
  const delInc = async id=>{ await db.collection("incomes").doc(id).delete(); };
  const delAcc = async id=>{ await db.collection("accounts").doc(id).delete(); };

  const addAcc = async()=>{
    if(!newA.name||!newA.bal) return;
    setSyncing(true);
    const cols=["#fbbf24","#a78bfa","#34d399","#60a5fa","#f472b6","#fb923c"];
    await db.collection("accounts").add({
      name:newA.name,inst:newA.inst,
      color:cols[accounts.length%cols.length],
      balance:parseFloat(parseFloat(newA.bal).toFixed(2)),
      createdAt:new Date().toISOString()
    });
    setNewA({name:"",inst:"",bal:""});
    setShowAcc(false);
    setSyncing(false);
    flashInv("Conta adicionada! ✓");
  };

  const addContr = async()=>{
    if(!invF.accId||!invF.amt||parseFloat(invF.amt)<=0) return;
    setSyncing(true);
    await db.collection("contribs").add({
      accId:invF.accId,month:parseInt(invF.month),year:parseInt(invF.year),
      amount:parseFloat(parseFloat(invF.amt).toFixed(2)),
      date:new Date().toISOString().split("T")[0],
      createdAt:new Date().toISOString()
    });
    setInvF(f=>({...f,amt:""}));
    setSyncing(false);
    flashInv("Aporte registrado! ✓");
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#0f0f13",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:40}}>💰</div>
      <div style={{fontSize:20,fontWeight:"bold"}}>Prosperidade</div>
      <div style={{width:36,height:36,border:"3px solid #2a2a3a",borderTop:"3px solid #7c6af7",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"#6b6b8a",fontSize:13}}>Conectando...</div>
    </div>
  );

  return (
    <div style={{maxWidth:430,margin:"0 auto",paddingBottom:90}}>

      {syncing&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"#7c6af7",padding:6,textAlign:"center",fontSize:11,color:"#fff"}}>Sincronizando...</div>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1a24,#12121a)",borderBottom:"1px solid #2a2a3a",padding:"16px 16px 12px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:10,color:"#6b6b8a",letterSpacing:3}}>FAMÍLIA</div>
            <div style={{fontSize:20,fontWeight:"bold",letterSpacing:-0.5}}>Prosperidade</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#6b6b8a"}}>{MONTHS[month]} {year}</div>
            <div style={{fontSize:11,color:"#4ade80"}}>↑ {fmt(totInc)}</div>
            <div style={{fontSize:11,color:"#f87171"}}>↓ {fmt(totExp)}</div>
            <div style={{fontSize:16,fontWeight:"bold",color:bal>=0?"#4ade80":"#f87171"}}>= {fmt(bal)}</div>
          </div>
        </div>

        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
          {["p1","p2"].map(p=>(
            <div key={p} style={{background:(p==="p1"?"#7c6af7":"#f472b6")+"22",border:"1px solid "+(p==="p1"?"#7c6af7":"#f472b6")+"55",borderRadius:20,padding:"4px 10px",fontSize:10,color:p==="p1"?"#7c6af7":"#f472b6",display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontWeight:"bold"}}>{names[p]}</span>
              <span style={{color:"#4ade80"}}>↑{fmt(pInc(p))}</span>
              <span style={{color:"#f87171"}}>↓{fmt(pExp(p))}</span>
            </div>
          ))}
          <button onClick={()=>setEditN(v=>!v)} style={{background:"transparent",border:"1px solid #2a2a3a",borderRadius:20,padding:"4px 8px",fontSize:10,color:"#6b6b8a",cursor:"pointer"}}>✏️</button>
        </div>

        {editN&&(
          <div style={{display:"flex",gap:8,marginTop:8}}>
            {["p1","p2"].map(p=>(
              <input key={p} value={names[p]} onChange={e=>setNames(prev=>({...prev,[p]:e.target.value}))} style={{...IS,padding:"7px 10px",fontSize:12,flex:1}} placeholder="Nome"/>
            ))}
            <button onClick={()=>setEditN(false)} style={{background:"#7c6af7",border:"none",borderRadius:8,color:"#fff",padding:"0 12px",cursor:"pointer",fontSize:12}}>OK</button>
          </div>
        )}

        <div style={{display:"flex",gap:5,marginTop:10,overflowX:"auto",paddingBottom:2}}>
          {MONTHS.map((m,i)=>(
            <button key={i} onClick={()=>setMonth(i)} style={{background:month===i?"#7c6af7":"#1e1e2e",color:month===i?"#fff":"#6b6b8a",border:"none",borderRadius:20,padding:"5px 11px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontWeight:month===i?"bold":"normal"}}>{m}</button>
          ))}
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #1e1e2e",background:"#12121a"}}>
        {[["add","➕ Lançar"],["dash","📊 Dash"],["list","🗂️ Lista"],["cmp","📈 Meses"],["inv","💰 Invest"]].map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"12px 2px",border:"none",background:"transparent",color:tab===id?"#7c6af7":"#4a4a6a",fontSize:10,cursor:"pointer",borderBottom:tab===id?"2px solid #7c6af7":"2px solid transparent",fontWeight:tab===id?"bold":"normal"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px 14px"}}>

        {/* ADD TAB */}
        {tab==="add"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",background:"#1a1a24",borderRadius:12,padding:3,marginBottom:16,border:"1px solid #2a2a3a"}}>
              {[["expense","↓ Gasto","#f87171"],["income","↑ Entrada","#4ade80"]].map(([m,l,c])=>(
                <button key={m} onClick={()=>setMode(m)} style={{background:mode===m?c+"22":"transparent",border:mode===m?"1.5px solid "+c:"1.5px solid transparent",borderRadius:10,padding:"10px",color:mode===m?c:"#6b6b8a",fontSize:14,fontWeight:"bold",cursor:"pointer"}}>{l}</button>
              ))}
            </div>

            {ok&&<div style={{background:"#14532d",color:"#4ade80",border:"1px solid #4ade80",borderRadius:10,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>{ok}</div>}

            {mode==="expense"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <input placeholder="Descrição (ex: Supermercado)" value={ef.desc} onChange={e=>setEf(f=>({...f,desc:e.target.value}))} style={IS}/>
                <div style={{display:"flex",gap:10}}>
                  <input placeholder="Valor" type="number" min="0" value={ef.amt} onChange={e=>setEf(f=>({...f,amt:e.target.value}))} style={{...IS,flex:1}}/>
                  <input type="date" value={ef.date} onChange={e=>setEf(f=>({...f,date:e.target.value}))} style={{...IS,flex:1}}/>
                </div>

                <div>
                  <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>QUEM GASTOU</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {["p1","p2"].map(p=>(
                      <button key={p} onClick={()=>setEf(f=>({...f,person:p}))} style={{background:ef.person===p?(p==="p1"?"#7c6af7":"#f472b6")+"33":"#1e1e2e",border:ef.person===p?"1.5px solid "+(p==="p1"?"#7c6af7":"#f472b6"):"1.5px solid #2a2a3a",borderRadius:10,padding:"11px 8px",color:ef.person===p?(p==="p1"?"#7c6af7":"#f472b6"):"#6b6b8a",fontSize:13,cursor:"pointer",fontWeight:ef.person===p?"bold":"normal"}}>{names[p]}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>CATEGORIA</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                    {CATS.map(c=>(
                      <button key={c.id} onClick={()=>setEf(f=>({...f,cat:c.id}))} style={{background:ef.cat===c.id?c.c+"33":"#1e1e2e",border:ef.cat===c.id?"1.5px solid "+c.c:"1.5px solid #2a2a3a",borderRadius:10,padding:"8px 4px",fontSize:20,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <span>{c.e}</span>
                        <span style={{fontSize:7,color:ef.cat===c.id?c.c:"#4a4a6a"}}>{c.l}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>PAGAMENTO</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {PMS.map(p=>(
                      <button key={p.id} onClick={()=>setEf(f=>({...f,pm:p.id}))} style={{background:ef.pm===p.id?"#7c6af733":"#1e1e2e",border:ef.pm===p.id?"1.5px solid #7c6af7":"1.5px solid #2a2a3a",borderRadius:10,padding:"10px 8px",color:ef.pm===p.id?"#c4b9ff":"#6b6b8a",fontSize:12,cursor:"pointer",textAlign:"left"}}>{p.e} {p.l}</button>
                    ))}
                  </div>
                  {ef.pm!=="corrente"&&(
                    <div style={{background:"#1e1a2e",border:"1px solid #3a2a6a",borderRadius:8,padding:"8px 12px",marginTop:8,fontSize:12,color:"#a78bfa"}}>
                      💡 Fatura de {MONTHS[(new Date(ef.date+"T12:00:00").getMonth()+1)%12]} (venc. dia 10)
                    </div>
                  )}
                </div>

                <button onClick={addExp} style={{background:"linear-gradient(135deg,#c0392b,#e74c3c)",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:16,fontWeight:"bold",cursor:"pointer",marginTop:4}}>↓ Lançar Gasto</button>
              </div>
            )}

            {mode==="income"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <input placeholder="Descrição (ex: Salário Maio)" value={inf.desc} onChange={e=>setInf(f=>({...f,desc:e.target.value}))} style={IS}/>
                <div style={{display:"flex",gap:10}}>
                  <input placeholder="Valor" type="number" min="0" value={inf.amt} onChange={e=>setInf(f=>({...f,amt:e.target.value}))} style={{...IS,flex:1}}/>
                  <input type="date" value={inf.date} onChange={e=>setInf(f=>({...f,date:e.target.value}))} style={{...IS,flex:1}}/>
                </div>

                <div>
                  <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>QUEM RECEBEU</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {["p1","p2"].map(p=>(
                      <button key={p} onClick={()=>setInf(f=>({...f,person:p}))} style={{background:inf.person===p?(p==="p1"?"#7c6af7":"#f472b6")+"33":"#1e1e2e",border:inf.person===p?"1.5px solid "+(p==="p1"?"#7c6af7":"#f472b6"):"1.5px solid #2a2a3a",borderRadius:10,padding:"11px 8px",color:inf.person===p?(p==="p1"?"#7c6af7":"#f472b6"):"#6b6b8a",fontSize:13,cursor:"pointer",fontWeight:inf.person===p?"bold":"normal"}}>{names[p]}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>TIPO</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                    {ITYPES.map(t=>(
                      <button key={t.id} onClick={()=>setInf(f=>({...f,type:t.id}))} style={{background:inf.type===t.id?t.c+"33":"#1e1e2e",border:inf.type===t.id?"1.5px solid "+t.c:"1.5px solid #2a2a3a",borderRadius:10,padding:"8px 4px",fontSize:20,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <span>{t.e}</span>
                        <span style={{fontSize:7,color:inf.type===t.id?t.c:"#4a4a6a"}}>{t.l}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <button onClick={addInc} style={{background:"linear-gradient(135deg,#16a34a,#22c55e)",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:16,fontWeight:"bold",cursor:"pointer",marginTop:4}}>↑ Registrar Entrada</button>
              </div>
            )}
          </div>
        )}

        {/* DASHBOARD */}
        {tab==="dash"&&(
          <div>
            <div style={{fontSize:11,color:"#6b6b8a",marginBottom:12,letterSpacing:1}}>DASHBOARD — {MONTHS[month]}</div>

            <div style={{background:bal>=0?"#14532d":"#2d0f0f",border:"1px solid "+(bal>=0?"#4ade80":"#f87171"),borderRadius:12,padding:"10px 14px",display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div>
                <div style={{fontSize:10,color:bal>=0?"#4ade80":"#f87171",letterSpacing:1}}>SALDO DO MÊS</div>
                <div style={{fontSize:22,fontWeight:"bold",color:bal>=0?"#4ade80":"#f87171"}}>{fmt(bal)}</div>
              </div>
              <div style={{textAlign:"right",fontSize:11,color:"#6b6b8a",lineHeight:1.9}}>
                <div>Entradas: <span style={{color:"#4ade80"}}>{fmt(totInc)}</span></div>
                <div>Saídas: <span style={{color:"#f87171"}}>{fmt(totExp)}</span></div>
              </div>
            </div>

            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>POR PESSOA</div>
              {["p1","p2"].map(p=>{
                const inc=pInc(p), exp=pExp(p), b=inc-exp;
                const col=p==="p1"?"#7c6af7":"#f472b6";
                return (
                  <div key={p} style={{background:"#1a1a24",borderRadius:12,padding:"12px 14px",marginBottom:8,borderLeft:"3px solid "+col}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontWeight:"bold",color:col}}>{names[p]}</span>
                      <span style={{fontWeight:"bold",color:b>=0?"#4ade80":"#f87171"}}>{fmt(b)}</span>
                    </div>
                    <div style={{display:"flex",gap:16,marginTop:6,fontSize:11,color:"#6b6b8a"}}>
                      <span>↑ <span style={{color:"#4ade80"}}>{fmt(inc)}</span></span>
                      <span>↓ <span style={{color:"#f87171"}}>{fmt(exp)}</span></span>
                    </div>
                  </div>
                );
              })}
            </div>

            {byType.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"#6b6b8a",marginBottom:8,letterSpacing:1}}>ENTRADAS POR TIPO</div>
                {byType.map(t=>(
                  <div key={t.id} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13}}>{t.e} {t.l}</span>
                      <span style={{fontSize:13,fontWeight:"bold",color:t.c}}>{fmt(t.total)}</span>
                    </div>
                    <div style={{background:"#1e1e2e",borderRadius:99,height:6,overflow:"hidden"}}>
                      <div style={{background:t.c,height:"100%",width:((t.total/maxType)*100)+"%",borderRadius:99}}/>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div style={CS("#4ade8022","#4ade80")}>
                <div style={{fontSize:10,color:"#4ade80",letterSpacing:1}}>CORRENTE</div>
                <div style={{fontSize:17,fontWeight:"bold",marginTop:4}}>{fmt(byCard.find(p=>p.id==="corrente")?.total||0)}</div>
              </div>
              <div style={CS("#7c6af722","#7c6af7")}>
                <div style={{fontSize:10,color:"#a78bfa",letterSpacing:1}}>CARTÕES</div>
                <div style={{fontSize:17,fontWeight:"bold",marginTop:4}}>{fmt(byCard.filter(p=>p.id!=="corrente").reduce((s,p)=>s+p.total,0))}</div>
              </div>
            </div>

            <div>
              <div style={{fontSize:11,color:"#6b6b8a",marginBottom:10,letterSpacing:1}}>GASTOS POR CATEGORIA</div>
              {byCat.length===0&&<div style={{color:"#4a4a6a",textAlign:"center",padding:16,fontSize:13}}>Sem gastos neste mês</div>}
              {byCat.map(c=>(
                <div key={c.id} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13}}>{c.e} {c.l}</span>
                    <span style={{fontSize:13,fontWeight:"bold",color:c.c}}>{fmt(c.total)}</span>
                  </div>
                  <div style={{background:"#1e1e2e",borderRadius:99,height:6,overflow:"hidden"}}>
                    <div style={{background:c.c,height:"100%",width:((c.total/maxCat)*100)+"%",borderRadius:99}}/>
                  </div>
                  <div style={{fontSize:10,color:"#4a4a6a",marginTop:2}}>{totExp>0?((c.total/totExp)*100).toFixed(1):0}% dos gastos</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* LIST */}
        {tab==="list"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",background:"#1a1a24",borderRadius:10,padding:3,marginBottom:14,border:"1px solid #2a2a3a"}}>
              {[["expense","↓ Gastos"],["income","↑ Entradas"]].map(([m,l])=>(
                <button key={m} onClick={()=>setMode(m)} style={{background:mode===m?"#2a2a3a":"transparent",border:"none",borderRadius:8,padding:9,color:mode===m?"#f0ede8":"#6b6b8a",fontSize:13,cursor:"pointer"}}>{l}</button>
              ))}
            </div>

            {mode==="expense"&&(
              <>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <select value={fPer} onChange={e=>setFPer(e.target.value)} style={SS}><option value="all">Todos</option>{["p1","p2"].map(p=><option key={p} value={p}>{names[p]}</option>)}</select>
                  <select value={fCat} onChange={e=>setFCat(e.target.value)} style={SS}><option value="all">Categorias</option>{CATS.map(c=><option key={c.id} value={c.id}>{c.l}</option>)}</select>
                  <select value={fPm}  onChange={e=>setFPm(e.target.value)}  style={SS}><option value="all">Pagamento</option>{PMS.map(p=><option key={p.id} value={p.id}>{p.l}</option>)}</select>
                </div>
                <div style={{fontSize:11,color:"#6b6b8a",marginBottom:10}}>{fExp.length} lançamentos — {fmt(fExp.reduce((s,e)=>s+e.amount,0))}</div>
                {fExp.length===0&&<div style={{color:"#4a4a6a",textAlign:"center",padding:30,fontSize:14}}>Nenhum gasto encontrado</div>}
                {fExp.map(e=>{
                  const cat=CATS.find(c=>c.id===e.cat);
                  const pm=PMS.find(p=>p.id===e.pm);
                  const col=e.person==="p1"?"#7c6af7":"#f472b6";
                  return (
                    <div key={e.id} style={{background:"#1a1a24",borderRadius:12,padding:"12px 14px",marginBottom:8,borderLeft:"3px solid "+(cat?.c||"#4a4a6a"),display:"flex",alignItems:"center",gap:12,animation:"fadeIn 0.2s ease"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{marginBottom:4}}><span style={{fontSize:10,background:col+"33",color:col,borderRadius:10,padding:"2px 8px"}}>{names[e.person]}</span></div>
                        <div style={{fontSize:14,fontWeight:"bold",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.desc}</div>
                        <div style={{fontSize:11,color:"#6b6b8a",marginTop:2}}>{cat?.e} {cat?.l} — {pm?.l} — {(e.date||"").split("-").reverse().join("/")}</div>
                        {e.isCard&&e.dueDate&&<div style={{fontSize:10,color:"#a78bfa",marginTop:1}}>Fatura: {e.dueDate.split("-").reverse().join("/")}</div>}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <span style={{fontSize:15,fontWeight:"bold",color:cat?.c}}>{fmt(e.amount)}</span>
                        <button onClick={()=>delExp(e.id)} style={{background:"transparent",border:"none",color:"#4a4a6a",fontSize:18,cursor:"pointer",padding:0}}>🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {mode==="income"&&(
              <>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <select value={fPer}  onChange={e=>setFPer(e.target.value)}  style={SS}><option value="all">Todos</option>{["p1","p2"].map(p=><option key={p} value={p}>{names[p]}</option>)}</select>
                  <select value={fType} onChange={e=>setFType(e.target.value)} style={SS}><option value="all">Tipos</option>{ITYPES.map(t=><option key={t.id} value={t.id}>{t.l}</option>)}</select>
                </div>
                <div style={{fontSize:11,color:"#6b6b8a",marginBottom:10}}>{fInc.length} entradas — {fmt(fInc.reduce((s,i)=>s+i.amount,0))}</div>
                {fInc.length===0&&<div style={{color:"#4a4a6a",textAlign:"center",padding:30,fontSize:14}}>Nenhuma entrada encontrada</div>}
                {fInc.map(i=>{
                  const tp=ITYPES.find(t=>t.id===i.type);
                  const col=i.person==="p1"?"#7c6af7":"#f472b6";
                  return (
                    <div key={i.id} style={{background:"#1a1a24",borderRadius:12,padding:"12px 14px",marginBottom:8,borderLeft:"3px solid "+(tp?.c||"#4ade80"),display:"flex",alignItems:"center",gap:12,animation:"fadeIn 0.2s ease"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{marginBottom:4}}><span style={{fontSize:10,background:col+"33",color:col,borderRadius:10,padding:"2px 8px"}}>{names[i.person]}</span></div>
                        <div style={{fontSize:14,fontWeight:"bold",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.desc}</div>
                        <div style={{fontSize:11,color:"#6b6b8a",marginTop:2}}>{tp?.e} {tp?.l} — {(i.date||"").split("-").reverse().join("/")}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <span style={{fontSize:15,fontWeight:"bold",color:tp?.c||"#4ade80"}}>+{fmt(i.amount)}</span>
                        <button onClick={()=>delInc(i.id)} style={{background:"transparent",border:"none",color:"#4a4a6a",fontSize:18,cursor:"pointer",padding:0}}>🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}

        {/* COMPARE */}
        {tab==="cmp"&&(
          <div>
            <div style={{fontSize:11,color:"#6b6b8a",marginBottom:14,letterSpacing:1}}>COMPARATIVO MENSAL</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[{lbl:MONTHS[prevM],inc:prevI,exp:prevT},{lbl:MONTHS[month],inc:totInc,exp:totExp}].map((col,idx)=>{
                const b=col.inc-col.exp;
                return (
                  <div key={idx} style={CS(idx===1?"#7c6af722":"#1e1e2e",idx===1?"#7c6af7":"#4a4a6a")}>
                    <div style={{fontSize:11,color:idx===1?"#a78bfa":"#6b6b8a",letterSpacing:1}}>{col.lbl.toUpperCase()}</div>
                    <div style={{fontSize:17,fontWeight:"bold",marginTop:4,color:b>=0?"#4ade80":"#f87171"}}>{fmt(b)}</div>
                    <div style={{fontSize:10,color:"#6b6b8a",marginTop:4,lineHeight:1.7}}>
                      <div>↑ {fmt(col.inc)}</div>
                      <div>↓ {fmt(col.exp)}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {diffP&&(
              <div style={{background:diff>0?"#2d0f0f":"#0f2d1a",border:"1px solid "+(diff>0?"#f87171":"#4ade80"),borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:24}}>{diff>0?"📈":"📉"}</span>
                <div>
                  <div style={{fontWeight:"bold",color:diff>0?"#f87171":"#4ade80",fontSize:15}}>{diff>0?"Gastou "+fmt(Math.abs(diff))+" a mais":"Economizou "+fmt(Math.abs(diff))}</div>
                  <div style={{fontSize:12,color:"#6b6b8a"}}>vs. {MONTHS[prevM]} ({diff>0?"+":"-"}{Math.abs(diffP)}%)</div>
                </div>
              </div>
            )}

            <div>
              <div style={{fontSize:11,color:"#6b6b8a",marginBottom:12,letterSpacing:1}}>POR CATEGORIA</div>
              {CATS.map(c=>{
                const curr=byCat.find(b=>b.id===c.id)?.total||0;
                const prev=prevBC[c.id]||0;
                if(curr===0&&prev===0) return null;
                const cd=curr-prev, mb=Math.max(curr,prev,1);
                return (
                  <div key={c.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13}}>{c.e} {c.l}</span>
                      <span style={{fontSize:12,color:cd>0?"#f87171":"#4ade80"}}>{cd>0?"+":""}{fmt(cd)}</span>
                    </div>
                    {[{lbl:MONTHS[prevM],val:prev,col:"#4a4a6a"},{lbl:MONTHS[month],val:curr,col:c.c}].map(row=>(
                      <div key={row.lbl} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{fontSize:10,color:"#6b6b8a",width:28}}>{row.lbl}</span>
                        <div style={{flex:1,background:"#1e1e2e",borderRadius:99,height:6,overflow:"hidden"}}>
                          <div style={{background:row.col,height:"100%",width:((row.val/mb)*100)+"%",borderRadius:99}}/>
                        </div>
                        <span style={{fontSize:10,color:row.col,width:62,textAlign:"right"}}>{fmt(row.val)}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* INVEST */}
        {tab==="inv"&&(
          <div>
            <div style={{fontSize:11,color:"#6b6b8a",marginBottom:14,letterSpacing:1}}>INVESTIMENTOS</div>
            {invOk&&<div style={{background:"#14532d",color:"#4ade80",border:"1px solid #4ade80",borderRadius:10,padding:"10px 14px",marginBottom:14,textAlign:"center"}}>{invOk}</div>}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div style={CS("#fbbf2422","#fbbf24")}>
                <div style={{fontSize:10,color:"#fbbf24",letterSpacing:1}}>PATRIMÔNIO</div>
                <div style={{fontSize:18,fontWeight:"bold",marginTop:4}}>{fmt(totInv)}</div>
                <div style={{fontSize:10,color:"#6b6b8a",marginTop:2}}>{accounts.length} contas</div>
              </div>
              <div style={CS("#34d39922","#34d399")}>
                <div style={{fontSize:10,color:"#34d399",letterSpacing:1}}>APORTADO</div>
                <div style={{fontSize:18,fontWeight:"bold",marginTop:4}}>{fmt(totContr)}</div>
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:11,color:"#6b6b8a",letterSpacing:1}}>CONTAS</div>
                <button onClick={()=>setShowAcc(v=>!v)} style={{background:"#7c6af733",border:"1px solid #7c6af7",borderRadius:8,color:"#c4b9ff",fontSize:11,cursor:"pointer",padding:"4px 10px"}}>+ Nova conta</button>
              </div>

              {showAcc&&(
                <div style={{background:"#1a1a24",border:"1px solid #2a2a3a",borderRadius:12,padding:14,marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
                  <input placeholder="Nome (ex: Tesouro Selic)" value={newA.name} onChange={e=>setNewA(f=>({...f,name:e.target.value}))} style={IS}/>
                  <input placeholder="Instituição (ex: XP)" value={newA.inst} onChange={e=>setNewA(f=>({...f,inst:e.target.value}))} style={IS}/>
                  <input placeholder="Saldo atual" type="number" value={newA.bal} onChange={e=>setNewA(f=>({...f,bal:e.target.value}))} style={IS}/>
                  <button onClick={addAcc} style={{background:"linear-gradient(135deg,#fbbf24,#f59e0b)",border:"none",borderRadius:10,padding:11,color:"#1a1000",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>Adicionar conta</button>
                </div>
              )}

              {accounts.map(a=>{
                const pct=totInv>0?((a.balance/totInv)*100).toFixed(1):0;
                const ac=contribs.filter(c=>c.accId===a.id).reduce((s,c)=>s+c.amount,0);
                return (
                  <div key={a.id} style={{background:"#1a1a24",borderRadius:12,padding:14,marginBottom:10,borderLeft:"3px solid "+a.color}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:"bold"}}>{a.name}</div>
                        <div style={{fontSize:11,color:"#6b6b8a",marginTop:2}}>{a.inst}</div>
                      </div>
                      <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <div style={{fontSize:16,fontWeight:"bold",color:a.color}}>{fmt(a.balance)}</div>
                        <div style={{fontSize:10,color:"#6b6b8a"}}>{pct}% do portfólio</div>
                        <button onClick={()=>delAcc(a.id)} style={{background:"transparent",border:"none",color:"#4a4a6a",fontSize:16,cursor:"pointer",padding:0}}>🗑️</button>
                      </div>
                    </div>
                    <div style={{background:"#12121a",borderRadius:99,height:5,overflow:"hidden",marginTop:10}}>
                      <div style={{background:a.color,height:"100%",width:pct+"%",borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:10,color:"#6b6b8a",marginTop:6}}>Aportado: <span style={{color:a.color}}>{fmt(ac)}</span></div>
                  </div>
                );
              })}
              {accounts.length===0&&<div style={{color:"#4a4a6a",textAlign:"center",padding:20,fontSize:13}}>Nenhuma conta cadastrada</div>}
            </div>

            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:"#6b6b8a",marginBottom:10,letterSpacing:1}}>REGISTRAR APORTE</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <select value={invF.accId} onChange={e=>setInvF(f=>({...f,accId:e.target.value}))} style={{...IS,padding:"12px 14px"}}>
                  <option value="">Selecione a conta...</option>
                  {accounts.map(a=><option key={a.id} value={a.id}>{a.name} — {a.inst}</option>)}
                </select>
                <div style={{display:"flex",gap:8}}>
                  <input placeholder="Valor" type="number" value={invF.amt} onChange={e=>setInvF(f=>({...f,amt:e.target.value}))} style={{...IS,flex:1}}/>
                  <select value={invF.month} onChange={e=>setInvF(f=>({...f,month:e.target.value}))} style={SS}>
                    {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <button onClick={addContr} style={{background:"linear-gradient(135deg,#34d399,#059669)",border:"none",borderRadius:12,padding:13,color:"#fff",fontSize:15,fontWeight:"bold",cursor:"pointer"}}>Registrar Aporte</button>
              </div>
            </div>

            {cByM.length>0&&(
              <div>
                <div style={{fontSize:11,color:"#6b6b8a",marginBottom:12,letterSpacing:1}}>APORTES POR MÊS</div>
                {cByM.map((c,i)=>(
                  <div key={i} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:12,color:"#c4b9ff"}}>{c.label}</span>
                      <span style={{fontSize:12,fontWeight:"bold",color:"#34d399"}}>{fmt(c.total)}</span>
                    </div>
                    <div style={{background:"#1e1e2e",borderRadius:99,height:8,overflow:"hidden"}}>
                      <div style={{background:"linear-gradient(90deg,#34d399,#059669)",height:"100%",width:((c.total/maxC)*100)+"%",borderRadius:99}}/>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
